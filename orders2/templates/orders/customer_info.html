<!DOCTYPE html>
<html lang="en">
{% load static %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chicken Order - Customer Info</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{% static 'orders/styles.css' %}">
</head>
<body>
<div class="container py-5">
    <div class="card mx-auto shadow-sm form-card">
        <div class="card-body">
            <h1 class="card-title text-center">Enter Details</h1>
            <form method="post" novalidate>
                {% csrf_token %}
                <div class="mb-3">{{ form.restaurant_name.label_tag }}{{ form.restaurant_name }}</div>
                <div class="mb-3">{{ form.Name.label_tag }}{{ form.Name }}</div>
                <div class="mb-3">{{ form.mobile.label_tag }}{{ form.mobile }}</div>
                <div class="mb-3">{{ form.email.label_tag }}{{ form.email }}</div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-primary btn-lg">Continue</button>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
